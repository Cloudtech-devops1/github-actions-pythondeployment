name: Deploy Python App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

    - name: Test SSH Connection
      run: |
        ssh -o IdentitiesOnly=yes -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} "echo Connected"

    - name: Deploy to EC2
      run: |
        ssh -o IdentitiesOnly=yes -o StrictHostKeyChecking=no ec2-user@${{ secrets.EC2_HOST }} << 'EOF'
          set -e

          echo "🚀 Starting deployment..."

          # Use dnf for Amazon Linux 2023
          sudo dnf update -y
          sudo dnf install -y python3 python3-pip git

          # Ensure pip works
          python3 -m ensurepip --upgrade
          python3 -m pip install --upgrade pip

          # Clone repo if not exists
          if [ ! -d "/home/ec2-user/app" ]; then
            git clone https://github.com/Cloudtech-devops1/github-actions-pythondeployment.git /home/ec2-user/app
          fi

          cd /home/ec2-user/app

          # Pull latest code
          git pull origin main

          # Create virtual environment (best practice)
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi

          source venv/bin/activate

          # Install dependencies
          pip install -r requirements.txt

          # Stop old app
          pkill -f app.py || true

          # Run app in background
          nohup python3 app.py > output.log 2>&1 &

          echo "✅ Deployment completed"
        EOF
